<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML an CSS Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <main>
        <h1>✅ Basic HTML and CSS Quiz</h1>
        <form>
            <div class="form-item">
                <label for="q1">1. What does the acronym CSS stand for?</label>
                <input type="text" name="q1" id="q1">
            </div>
            <div class="form-item">
                <label for="q2">2. How are id and class atributes selected in CSS?</label>
                <textarea name="q2" id="q2"></textarea>
            </div>
            <div class="form-item">
                <label for="q3">3. Wich of the following is a valid CSS comment?</label>
                <select name="q3" id="q3">
                    <option value="" selected disabled>Choose One ...</option>
                    <option value="html-comment">&lt;!-- comment --&gt;</option>
                    <option value="css-comment">/* comment */</option>
                    <option value="js-comment">// comment</option>
                </select>
            </div>
            <div class="form-item">
                <label for="q4">4. What is the bottom margin given this declaration?</label>
                <code>margin: 10px 5px 15px;</code>
                <input type="number" name="q4" id="q4">
            </div>
            <button type="submit">Submit Quiz</button>
        </form>
    </main>
</body>

</html>
