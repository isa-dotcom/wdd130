<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description"
      content="Contact White Water Rafting for reservations, questions, and information about our rafting adventures.">
    <meta name="author" content="Isadora Paula">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header class="site-header">
        <img src="images/logo.png" alt="Rafting travel logo" width="200">

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="contact-info">
            <h1>White Water Rafting Company</h1>
            <address>
                <p>Estrada Geral da Linha Café</p>
                <p>Bairro Linha Café Alta, Três Coroas - RS, 95660-000</p>
                <p>+1 (999) 999-9999</p>
                <p>info@whitewaterrafting.com</p>
            </address>
        </section>
        <section class="contact-grid">
            <div class="map"> <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d27801.805577814222!2d-50.786810225375426!3d-29.422199260216466!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9519241ae39bd73b%3A0x8335d51574f4bbe8!2sBrasil%20Raft%20Park!5e0!3m2!1spt-BR!2sbr!4v1781627023267!5m2!1spt-BR!2sbr"
                  allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe> </div>
            <form>

                <div class="form-item">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-item">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <fieldset>
                    <legend>Message Purpose</legend>

                    <label for="general-inquiry">
                        <input type="radio" id="general-inquiry" name="purpose"
                          value="general-inquiry" required>
                        General Inquiry
                    </label>

                    <label for="reservation-question">
                        <input type="radio" id="reservation-question" name="purpose"
                          value="reservation-question">
                        Reservation Question
                    </label>

                    <label for="website-suggestion">
                        <input type="radio" id="website-suggestion" name="purpose"
                          value="website-suggestion">
                        Website Suggestion
                    </label>
                </fieldset>

                <div class="form-item">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5"></textarea>
                </div>

                <label for="newsletter" class="checkbox">
                    <input type="checkbox" id="newsletter" name="newsletter">

                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">
                    Send My Message
                </button>

            </form>
        </section>
        <section class="employees">
            <h2>Meet Our Team</h2>
            <div class="employee-grid">
                <figure> <img src="images/sarah.jpg" alt="Operations Manager">
                    <figcaption>
                        Sarah Johnson
                        <br>
                        <span>Operations Manager</span>
                    </figcaption>
                </figure>
                <figure> <img src="images/michael.jpg" alt="Senior River Guide">
                    <figcaption>
                        Michael Davis
                        <br>
                        <span>Senior River Guide</span>
                    </figcaption>
                </figure>
                <figure> <img src="images/emily.jpg" alt="Customer Service Specialist">
                    <figcaption>
                        Emily Carter
                        <br>
                        <span>Customer Service Specialist</span>
                    </figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 White Water Rafting Adventures | Built by Isadora Paula</p>
        <nav class="socialmedia">
            <a href="https://whatsapp.com" target="_blank">
                <img src="images/whatsapp.png" alt="Whatsapp Icon" width="50">
            </a>
            <a href="https://Instagram.com" target="_blank">
                <img src="images/instagram.png" alt="Instagram Icon" width="50">
            </a>
            <a href="https://linkedin.com" target="_blank">
                <img src="images/linkedin.png" alt="Linkedin Icon" width="50">
            </a>
        </nav>
    </footer>
</body>

</html>
